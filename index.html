
<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ΠΟΥΕΦ - Ταμείο</title>
<style>
body{font-family:Arial;background:#f3f4f6;margin:0}
header{background:#111827;color:white;padding:20px;text-align:center}
.container{max-width:1200px;margin:auto;padding:20px}
.card,.section{background:white;padding:20px;border-radius:20px;box-shadow:0 2px 10px rgba(0,0,0,.1);margin-bottom:20px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px}
input,button{width:100%;padding:12px;border-radius:10px;margin-top:10px}
button{background:#111827;color:white;border:none}
</style>
</head>
<body>

<header>
<h1>ΠΟΥΕΦ - Ηλεκτρονικό Βιβλίο Ταμείου</h1>
</header>

<div class="container">

<div class="section">
<h2>Αρχικό Υπόλοιπο</h2>
<input type="number" id="balanceInput" value="71477.52">
<button onclick="saveBalance()">Αποθήκευση</button>
</div>

<div class="cards">
<div class="card">
<h3>Υπόλοιπο</h3>
<p id="balanceText">71.477,52 €</p>
</div>

<div class="card">
<h3>Έσοδα</h3>
<p>0 €</p>
</div>

<div class="card">
<h3>Έξοδα</h3>
<p>0 €</p>
</div>
</div>

<div class="section">
<h2>Ετήσιες Αναφορές</h2>

<button onclick="window.print()">Εκτύπωση PDF</button>

<p>Μπορείς να αποθηκεύσεις το PDF από το κινητό ή τον υπολογιστή.</p>
</div>

</div>

<script>
function saveBalance(){
const value=document.getElementById('balanceInput').value;

localStorage.setItem('pouefBalance',value);

document.getElementById('balanceText').innerText=
parseFloat(value).toLocaleString('el-GR') + ' €';

alert('Το ποσό αποθηκεύτηκε');
}

window.onload=function(){
const saved=localStorage.getItem('pouefBalance');

if(saved){
document.getElementById('balanceInput').value=saved;
document.getElementById('balanceText').innerText=
parseFloat(saved).toLocaleString('el-GR') + ' €';
}
}
</script>

</body>
</html>
