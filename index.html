
<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ΠΟΥΕΦ V7</title>
<style>
body{font-family:Arial;margin:0;background:#eef2f7}
header{background:#0f172a;color:white;padding:15px;text-align:center}
.container{max-width:1000px;margin:auto;padding:10px}
.card{background:white;border-radius:16px;padding:15px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
input,select,button{width:100%;padding:12px;margin-top:8px;border-radius:10px;border:1px solid #ccc;box-sizing:border-box}
button{background:#1e3a8a;color:white;font-weight:bold;border:none}
.entry{background:#fff;border-radius:14px;padding:12px;margin-top:10px;border-left:5px solid #1e3a8a}
.preview{width:90px;border-radius:10px;margin-top:10px;cursor:pointer}
.modal{display:none;position:fixed;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,.92);justify-content:center;align-items:center;z-index:9999}
.modal img{max-width:95%;max-height:95%}
.close{position:absolute;top:20px;right:25px;color:white;font-size:40px;cursor:pointer}
.watermark{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);font-size:100px;opacity:.03;pointer-events:none}
</style>
</head>
<body>

<div class="watermark">ΠΟΥΕΦ</div>

<header>
<h1>ΠΟΥΕΦ - Οικονομική Διαχείριση V7</h1>
</header>

<div class="container">

<div class="grid">
<div class="card">
<h3>🏦 Τραπεζικό Υπόλοιπο</h3>
<input type="number" id="bank">
</div>

<div class="card">
<h3>💵 Ταμειακό Υπόλοιπο</h3>
<input type="number" id="cash">
</div>
</div>

<div class="card">
<h2>🟢 Καταχώρηση Εσόδου</h2>

<select id="incomeCategory">
<option>Συνδρομές Μελών</option>
<option>Τόκοι Τράπεζας</option>
<option>Λοιπά Έσοδα</option>
</select>

<input type="date" id="incomeDate">
<input type="text" id="incomeDesc" placeholder="Περιγραφή">
<input type="number" id="incomeAmount" placeholder="Ποσό">

<button onclick="addIncome()">Καταχώρηση</button>
</div>

<div class="card">
<h2>🔴 Καταχώρηση Εξόδου</h2>

<select id="expenseCategory">
<option>Συνεδριάσεις - Μετακινήσεις - Διαμονές Δ.Σ.</option>
<option>Νομικός Σύμβουλος</option>
<option>Ταχυδρομείο - Courier</option>
<option>ΑΔΕΔΥ</option>
<option>Λογιστής</option>
<option>Δημόσιες Σχέσεις</option>
<option>Εκτυπώσεις</option>
<option>Γραφική Ύλη</option>
<option>Internet / Hosting</option>
<option>Τραπεζικά Έξοδα</option>
<option>Λοιπά Έξοδα</option>
</select>

<input type="date" id="expenseDate">
<input type="text" id="expenseDesc" placeholder="Περιγραφή">
<input type="number" id="expenseAmount" placeholder="Ποσό">
<input type="file" id="expenseFile" accept="image/*">

<button onclick="addExpense()">Καταχώρηση</button>
</div>

<div class="card">
<h2>📋 Κινήσεις</h2>
<div id="entries"></div>
</div>

<div class="card">
<h2>📄 PDF Συνεδρίου</h2>
<p>• Ετήσιος Απολογισμός</p>
<p>• Προϋπολογισμός</p>
<p>• Αναλυτικά Έσοδα / Έξοδα</p>
<button onclick="window.print()">Εκτύπωση PDF</button>
</div>

</div>

<div class="modal" id="modal">
<span class="close" onclick="closeModal()">&times;</span>
<img id="modalImg">
</div>

<script>
let items = JSON.parse(localStorage.getItem('pouefv7') || '[]');

function save(){
localStorage.setItem('pouefv7', JSON.stringify(items));
render();
}

function addIncome(){
items.push({
type:'Έσοδο',
category:incomeCategory.value,
date:incomeDate.value,
desc:incomeDesc.value,
amount:incomeAmount.value,
image:null
});
save();
}

function addExpense(){

const file = expenseFile.files[0];

const finish=(img)=>{
items.push({
type:'Έξοδο',
category:expenseCategory.value,
date:expenseDate.value,
desc:expenseDesc.value,
amount:expenseAmount.value,
image:img
});
save();
};

if(file){
const r = new FileReader();
r.onload = e => finish(e.target.result);
r.readAsDataURL(file);
}else{
finish(null);
}
}

function openModal(src){
modal.style.display='flex';
modalImg.src=src;
}

function closeModal(){
modal.style.display='none';
}

function render(){

entries.innerHTML='';

items.forEach((x,i)=>{

entries.innerHTML += `
<div class="entry">
<b>${x.type}</b><br>
${x.date}<br>
${x.category}<br>
${x.desc}<br>
<b>${x.amount} €</b><br>

${x.image ? `<img class="preview" src="${x.image}" onclick='openModal(${JSON.stringify(x.image)})'>` : ''}

</div>
`;

});

}

render();
</script>

</body>
</html>
