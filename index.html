<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ΠΟΥΕΦ V5</title>
<style>
*{box-sizing:border-box}
body{
font-family:Arial;
margin:0;
background:#eef2f7;
}
header{
background:#0f172a;
color:white;
padding:18px;
text-align:center;
}
.container{
max-width:1400px;
margin:auto;
padding:12px;
}
.section{
background:white;
padding:18px;
border-radius:20px;
margin-bottom:18px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
width:100%;
}
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:12px;
margin-bottom:18px;
}
.card{
padding:18px;
border-radius:18px;
color:white;
}
.blue{background:#2563eb}
.yellow{background:#ca8a04}
.green{background:#16a34a}
.red{background:#dc2626}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:12px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#1e3a8a;
color:white;
font-weight:bold;
border:none;
}

.table-wrap{
overflow-x:auto;
width:100%;
}

table{
width:100%;
border-collapse:collapse;
min-width:850px;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
font-size:14px;
}

th{
background:#1e3a8a;
color:white;
}

.preview{
width:70px;
border-radius:10px;
cursor:pointer;
}

.modal{
display:none;
position:fixed;
z-index:9999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
justify-content:center;
align-items:center;
padding:15px;
}

.modal-content{
max-width:100%;
max-height:100%;
border-radius:12px;
}

.close{
position:absolute;
top:15px;
right:25px;
font-size:42px;
color:white;
cursor:pointer;
}

.watermark{
position:fixed;
top:45%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
opacity:.04;
pointer-events:none;
font-weight:bold;
}

@media(max-width:700px){

body{
font-size:14px;
}

.section{
padding:14px;
}

.cards{
grid-template-columns:1fr 1fr;
}

.card h2{
font-size:20px;
}

table{
min-width:700px;
}

}

</style>
</head>
<body>

<div class="watermark">ΠΟΥΕΦ</div>

<header>
<h1>ΠΟΥΕΦ - Ηλεκτρονικό Βιβλίο Ταμείου V5</h1>
</header>

<div class="container">

<div class="section">
<h2>Ρυθμίσεις Υπολοίπων</h2>

<label>🏦 Τραπεζικό Υπόλοιπο</label>
<input type="number" id="bankInput">

<label>💵 Ταμειακό Υπόλοιπο</label>
<input type="number" id="cashInput">

<button onclick="saveBalances()">Αποθήκευση</button>
</div>

<div class="cards">
<div class="card blue">
<h3>🏦 Τραπεζικό</h3>
<h2 id="bankCard">0 €</h2>
</div>

<div class="card yellow">
<h3>💵 Ταμείο</h3>
<h2 id="cashCard">0 €</h2>
</div>

<div class="card green">
<h3>🟢 Έσοδα</h3>
<h2 id="incomeCard">0 €</h2>
</div>

<div class="card red">
<h3>🔴 Έξοδα</h3>
<h2 id="expenseCard">0 €</h2>
</div>
</div>

<div class="section">
<h2>Καταχώρηση Εξόδου</h2>

<select id="expenseCategory">
<option>Ταχυδρομείο - Courier</option>
<option>Λογιστής</option>
<option>ΑΔΕΔΥ</option>
<option>Μετακινήσεις ΔΣ</option>
</select>

<input type="date" id="expenseDate">
<input type="text" id="expenseDesc" placeholder="Περιγραφή">
<input type="number" id="expenseAmount" placeholder="Ποσό">
<input type="file" id="expenseFile" accept="image/*">

<button onclick="addExpense()">Καταχώρηση Εξόδου</button>
</div>

<div class="section">
<h2>📖 Βιβλίο Ταμείου</h2>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>Ημερομηνία</th>
<th>Τύπος</th>
<th>Κατηγορία</th>
<th>Περιγραφή</th>
<th>Ποσό</th>
<th>Παραστατικό</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<div class="section">
<h2>📎 Παραστατικά</h2>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>Ημερομηνία</th>
<th>Κατηγορία</th>
<th>Ποσό</th>
<th>Προβολή</th>
</tr>
</thead>
<tbody id="receiptBody"></tbody>
</table>
</div>

</div>

</div>

<div class="modal" id="imageModal">
<span class="close" onclick="closeModal()">&times;</span>
<img class="modal-content" id="modalImg">
</div>

<script>

let transactions = JSON.parse(localStorage.getItem('transactionsV5') || '[]');

function euro(n){
return Number(n).toLocaleString('el-GR') + ' €';
}

function saveBalances(){
localStorage.setItem('bankBalanceV5', bankInput.value);
localStorage.setItem('cashBalanceV5', cashInput.value);
render();
}

function addExpense(){

const file = expenseFile.files[0];

if(!file){
alert('Επίλεξε παραστατικό');
return;
}

const reader = new FileReader();

reader.onload = function(e){

transactions.push({
type:'Έξοδο',
category:expenseCategory.value,
date:expenseDate.value,
desc:expenseDesc.value,
amount:expenseAmount.value,
image:e.target.result
});

localStorage.setItem('transactionsV5', JSON.stringify(transactions));

render();

alert('Καταχωρήθηκε');
};

reader.readAsDataURL(file);
}

function openModal(src){

const modal = document.getElementById('imageModal');
const img = document.getElementById('modalImg');

img.src = src;
modal.style.display = 'flex';
}

function closeModal(){
document.getElementById('imageModal').style.display = 'none';
}

window.onclick = function(event){
const modal = document.getElementById('imageModal');
if(event.target == modal){
closeModal();
}
}

function render(){

transactions = JSON.parse(localStorage.getItem('transactionsV5') || '[]');

const table = document.getElementById('tableBody');
const receipts = document.getElementById('receiptBody');

table.innerHTML = '';
receipts.innerHTML = '';

let expenses = 0;

transactions.forEach((t)=>{

expenses += Number(t.amount || 0);

table.innerHTML += `
<tr>
<td>${t.date}</td>
<td>${t.type}</td>
<td>${t.category}</td>
<td>${t.desc}</td>
<td>${euro(t.amount)}</td>
<td>
<img class="preview" src="${t.image}" onclick='openModal(${JSON.stringify(t.image)})'>
</td>
</tr>`;

receipts.innerHTML += `
<tr>
<td>${t.date}</td>
<td>${t.category}</td>
<td>${euro(t.amount)}</td>
<td>
<button onclick='openModal(${JSON.stringify(t.image)})'>
Προβολή
</button>
</td>
</tr>`;
});

expenseCard.innerText = euro(expenses);

bankCard.innerText = euro(localStorage.getItem('bankBalanceV5') || 0);
cashCard.innerText = euro(localStorage.getItem('cashBalanceV5') || 0);

bankInput.value = localStorage.getItem('bankBalanceV5') || 0;
cashInput.value = localStorage.getItem('cashBalanceV5') || 0;
}

render();

</script>

</body>
</html>
